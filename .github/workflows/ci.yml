name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client:
    name: Client — lint, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  server:
    name: Server — build, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install both SDKs: server targets net8.0, test project targets net10.0
      - name: Set up .NET 8 and 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Build server
        run: dotnet build server/server.csproj --configuration Release

      - name: Test
        run: dotnet test server.Tests/server.Tests.csproj --configuration Release
        env:
          # Satisfy startup validation without real credentials in CI
          GOOGLE_APPLICATION_CREDENTIALS: /dev/null
          R2_CREDENTIALS_PATH: /dev/null
